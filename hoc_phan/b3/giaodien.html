<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Giao diện</title>
</head>

<body>

<h1 id="tieude">
KHOA KỸ THUẬT VÀ CÔNG NGHỆ
</h1>

Màu chữ:
<input type="text" id="mauchu">

<br><br>

Màu nền:
<input type="text" id="maunen">

<br><br>

Cỡ chữ:
<input type="text" id="cochu">

<br><br>

<button onclick="doi()">
Thay đổi
</button>

<script>

function doi()
{
document.getElementById("tieude").style.color=
document.getElementById("mauchu").value;

document.getElementById("tieude").style.background=
document.getElementById("maunen").value;

document.getElementById("tieude").style.fontSize=
document.getElementById("cochu").value+"px";
}

</script>

</body>
</html>
