<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>

<body>

<h1>TÍNH ĐIỂM HỌC PHẦN</h1>

Điểm CC
<input id="cc">

<br><br>

Điểm GK
<input id="gk">

<br><br>

Điểm CK
<input id="ck">

<br><br>

Điểm HP
<input id="hp">

<br><br>

<button onclick="tinh()">
Tính điểm HP
</button>

<script>

function tinh()
{
let cc=parseFloat(document.getElementById("cc").value);

let gk=parseFloat(document.getElementById("gk").value);

let ck=parseFloat(document.getElementById("ck").value);

let hp=(cc*2+gk*2+ck*6)/10;

document.getElementById("hp").value=hp;
}

</script>

</body>
</html>
